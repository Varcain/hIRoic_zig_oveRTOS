lang: zig
config_name: hiroic_zig
description: "hIRoic Convolution Reverb (Zig)"
zig:
  src_dir: src
  lib_name: hiroic_zig
defconfig:
  - CONFIG_OVE_BSP=y
  - CONFIG_OVE_AUDIO=y
  - CONFIG_OVE_FS=y
  - CONFIG_OVE_LVGL=y
  - CONFIG_OVE_QUEUE=y
  - CONFIG_OVE_TIMER=y
  - CONFIG_OVE_EVENTGROUP=y
  - CONFIG_OVE_SHELL=y
  - CONFIG_OVE_NVS=y
  - CONFIG_OVE_WATCHDOG=y
rtos_defconfig:
  freertos:
    - CONFIG_FREERTOS_TOTAL_HEAP_SIZE=65536
  # Zig's `Thread(N).spawn` / `Queue.create` / `Timer.create` route
  # through `std.mem.Allocator` → libc `malloc`.  On Zephyr that's the
  # picolibc malloc backed by sbrk over RAM left after the static
  # image — *not* the kernel `k_malloc` heap.  So a big
  # `HEAP_MEM_POOL_SIZE` would *starve* sbrk: every byte added to the
  # kernel heap is a byte removed from the libc arena.
  #
  # The Zig port's worst case is ~90 KB (four threads with Zephyr's
  # power-of-2 stack alignment burns ~33 KB per Thread(8192) once the
  # binding's libc over-align dance is counted).  Keep `HEAP_MEM_POOL`
  # tiny (just for Zephyr fs handles) so sbrk has the remaining
  # ~140 KB free for libc malloc.
  zephyr:
    - CONFIG_ZEPHYR_HEAP_MEM_POOL_SIZE=8192
kconfig: |
  config DSP_BUFFER_SIZE
  	int "DSP buffer size (samples)"
  	default 512

  config DSP_BITSIZE
  	int "DSP bit depth"
  	default 32

  config DSP_RATE
  	int "Sample rate (Hz)"
  	default 44100

  config IR_MAX_LEN
  	int "Maximum IR length (samples)"
  	default 1048
